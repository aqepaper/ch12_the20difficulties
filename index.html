<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習助教</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #2d3748;
    --muted: #718096;
    --accent: #553c9a;
    --accent-light: #e9d8fd;
    --accent-dark: #44337a;
    --success: #276749;
    --bubble-user: #553c9a;
    --shadow: 0 2px 10px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* 桌機外框背景 */
  html { background: #c5b3e8; min-height: 100%; }

  /* 主體：手機全寬，桌機限 500px 置中 */
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 500px;
    margin: 0 auto;
    box-shadow: 0 0 48px rgba(85,60,154,0.22);
  }

  /* Header */
  header {
    background: var(--accent);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(85,60,154,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 19px; font-weight: 500;
    color: #fff; letter-spacing: 0.06em;
  }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 3px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15);
    color: #fff; font-size: 13px;
    padding: 6px 12px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #68d391; flex-shrink: 0; }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .msg-wrap { display: flex; align-items: flex-end; gap: 10px; animation: fadeUp 0.2s ease; }
  .msg-wrap.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .avatar.ai   { background: var(--accent-light); color: var(--accent); border: 2px solid #d6bcfa; }
  .avatar.user { background: var(--bubble-user); color: #fff; }

  .msg-inner { display: flex; flex-direction: column; max-width: 82%; }
  .msg-wrap.user .msg-inner { align-items: flex-end; }

  /* 長輩友善：泡泡字級 17px、行距 1.85 */
  .bubble {
    padding: 13px 16px; border-radius: 18px;
    font-size: 17px; line-height: 1.85;
    white-space: pre-wrap; word-break: break-word;
  }
  .bubble.ai {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .bubble.user {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .saved-badge {
    font-size: 12px; color: var(--success);
    margin-top: 5px; display: flex; align-items: center; gap: 4px;
  }
  .thinking { display: flex; gap: 6px; padding: 6px 4px; align-items: center; }
  .thinking span {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent-light);
    animation: bounce 1.2s ease infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  .sys-msg {
    text-align: center; font-size: 13px; color: var(--muted);
    padding: 7px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    align-self: center; line-height: 1.6;
  }

  /* Footer */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 16px 20px;
    flex-shrink: 0;
  }

  /* 快捷按鈕：長輩友善，最小高度 48px */
  .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .quick-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 24px;
    border: 2px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent-dark);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    min-height: 48px;
  }
  .quick-btn:hover  { background: #d6bcfa; }
  .quick-btn:active { transform: scale(0.97); }

  /* 輸入列 */
  .input-row {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--bg); border: 2px solid var(--border);
    border-radius: 16px; padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  /* 長輩友善：輸入框字級 17px */
  #user-input {
    flex: 1; border: none; background: transparent; resize: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 17px; color: var(--text);
    line-height: 1.65; max-height: 140px; outline: none; min-height: 28px;
  }
  #user-input::placeholder { color: var(--muted); }

  /* 送出按鈕：48px 好點擊 */
  .send-btn {
    width: 48px; height: 48px; border-radius: 12px;
    background: var(--accent); color: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover   { background: var(--accent-dark); }
  .send-btn:active  { transform: scale(0.95); }
  .send-btn:disabled{ background: #c4b5fd; cursor: not-allowed; }

  .footer-note {
    text-align: center; font-size: 12px;
    color: var(--muted); margin-top: 8px; line-height: 1.5;
  }

  /* 登入提示說明 */
  #login-hint {
    background: #ede9f8;
    border-bottom: 1px solid #d6bcfa;
    padding: 12px 20px;
    font-size: 15px;
    color: #44337a;
    line-height: 1.7;
    text-align: center;
    flex-shrink: 0;
  }
  #login-hint strong { color: var(--accent); font-weight: 700; }
  #login-hint.hidden { display: none; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); }
    40%          { transform:translateY(-6px); }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">📚</div>
    <div>
      <div class="header-title">學習助教</div>
      <div class="header-sub" id="header-sub">依課程內容回答問題</div>
    </div>
  </div>
  <div class="status-pill" id="status-pill"><span class="dot"></span>已連線</div>
</header>

<div id="login-hint">
  請先輸入手機後四碼。如無登記，請以訪客身分輸入 <strong>0000</strong>
</div>

<div id="messages">
  <div class="sys-msg">📖 你好！請輸入您的4位數代碼</div>
</div>

<footer>
  <div class="quick-btns">
    <button class="quick-btn" onclick="sendQuick('我想寫學習單')">✏️ 我想寫學習單</button>
  </div>
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="輸入代碼或問題，Enter 送出…"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer-note">回答以課程內容為主・對話記錄自動存入 Sheets</div>
</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxTG8e1a6BbAgzzA_8bKFe5eU8SXhI_nmh4doCYgDv7qg3BUUEz_E_sORnYvuEi2rOwow/exec';

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');

const MEMBERS = {
  '0000': '訪客',
  '9168': '傳首', '6201': '法睿', '6508': '法曠', '9207': '法煥',
  '8225': '傳普', '6030': '法涑', '1260': '傳信', '9420': '傳通',
  '6177': '傳安', '8493': '傳強', '8999': '法士', '3293': '法治',
  '8095': '傳護', '1185': '法孝', '8973': '法全', '6979': '傳惟',
  '1910': '法主'
};

let currentMember = null;
let conversationHistory = [];
let hwState = null;        // null / 'step1' / 'step2' / 'step3' / 'done'
let chosenDifficulty = '';

const HW_INSTRUCTIONS = {
  step1:
`【作業引導模式－步驟一】
你現在正在引導慈心觀照學習單作業。
請只做一件事：詢問學員想探討二十難中的哪一難。
不要回答課程問題，不要做其他說明，只問這一個問題。`,

  step2: function(d) { return (
`【作業引導模式－步驟二】
學員已選擇：「${d}」。
請只做一件事：詢問學員覺察到自己有什麼心念或情緒（也就是發現了什麼煩惱）。
不要解釋這一難的內容，不要跑到步驟三，只問覺察這一個問題。`); },

  step3: function(d) { return (
`【作業引導模式－步驟三】
學員選的難：「${d}」，已完成覺察回答。
請只做一件事：詢問學員用什麼法門來轉變或改變這個煩惱。
不要給回饋，不要提前總結，只問覺照這一個問題。`); },

  done: function(d) { return (
`【作業引導模式－步驟四，最終回饋】
學員選的難：「${d}」，覺察與覺照均已填寫完畢。
請依以下結構給予整體回饋：

1. 覺察（發現煩惱）：
   重述學員覺察到的心念或情緒，肯定他的自我觀照，並引用課程內容說明這一難的修行意涵。

2. 覺照（破除煩惱）：
   回應學員所用的法門，說明如何以此法門轉化煩惱，結合課程義理給予鼓勵。

結尾加上「感恩師兄的用心，祝福您在修行路上精進！🙏」，完成後不要再問問題。`); }
};

function getHwInstruction() {
  if (!hwState) return '';
  if (hwState === 'step1') return '\n\n' + HW_INSTRUCTIONS.step1;
  if (hwState === 'step2') return '\n\n' + HW_INSTRUCTIONS.step2(chosenDifficulty);
  if (hwState === 'step3') return '\n\n' + HW_INSTRUCTIONS.step3(chosenDifficulty);
  if (hwState === 'done')  return '\n\n' + HW_INSTRUCTIONS.done(chosenDifficulty);
  return '';
}

function advanceHwState(userText) {
  if (!hwState) return;
  if (hwState === 'step1') { chosenDifficulty = userText; hwState = 'step2'; return; }
  if (hwState === 'step2') { hwState = 'step3'; return; }
  if (hwState === 'step3') { hwState = 'done';  return; }
  if (hwState === 'done')  { hwState = null; chosenDifficulty = ''; }
}

function setMember(code, dharmaName) {
  currentMember = { code, dharmaName };
  conversationHistory = [];
  hwState = null;
  chosenDifficulty = '';
  const isGuest    = (code === '0000');
  const displayName = isGuest ? '師兄' : dharmaName + ' 師兄';
  const hint = document.getElementById('login-hint');
  if (hint) hint.classList.add('hidden');
  document.getElementById('header-sub').textContent = displayName;
  document.getElementById('status-pill').innerHTML =
    '<span class="dot"></span>' + displayName + ' 已識別';
}

function appendMsg(role, text) {
  const wrap   = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  const av     = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'user' ? '我' : 'AI';
  const inner  = document.createElement('div');
  inner.className = 'msg-inner';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  inner.appendChild(bubble);
  wrap.appendChild(av);
  wrap.appendChild(inner);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return inner;
}

function addSavedBadge(inner) {
  // 不顯示已存入提示
}

function showThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ai';
  wrap.id = 'thinking';
  wrap.innerHTML = '<div class="avatar ai">AI</div>'
    + '<div class="msg-inner"><div class="bubble ai">'
    + '<div class="thinking"><span></span><span></span><span></span></div>'
    + '</div></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

function sendQuick(text) {
  inputEl.value = text;
  sendMessage();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  // 純4位數字 → 前端識別
  if (/^\d{4}$/.test(text)) {
    appendMsg('user', text);
    if (MEMBERS[text]) {
      setMember(text, MEMBERS[text]);
      const isGuest   = (text === '0000');
      const greeting  = isGuest
        ? '阿彌陀佛，師兄，歡迎使用學習助教，有什麼問題想請教？'
        : '阿彌陀佛，' + MEMBERS[text] + ' 師兄，有什麼問題想請教？';
      appendMsg('ai', greeting);
      conversationHistory.push({ role: 'assistant', content: greeting });
    } else {
      appendMsg('ai', '代碼不符，請確認後再試。');
    }
    sendBtn.disabled = false;
    inputEl.focus();
    return;
  }

  // 尚未識別
  if (!currentMember) {
    appendMsg('user', text);
    appendMsg('ai', '師兄好，請先輸入您的4位數代碼以識別身份。');
    sendBtn.disabled = false;
    inputEl.focus();
    return;
  }

  // 已識別：處理作業流程
  const isHwTrigger = /學習單|作業|慈心觀照|覺察|覺照|我要開始寫/.test(text);
  if (isHwTrigger && !hwState) { hwState = 'step1'; }

  const hwInstr = getHwInstruction();
  if (hwState && !isHwTrigger) { advanceHwState(text); }

  const msgWithId = '【學員：' + currentMember.dharmaName + ' 師兄（已驗證）】\n' + text + hwInstr;
  const userInner = appendMsg('user', text);
  showThinking();

  conversationHistory.push({ role: 'user', content: msgWithId });

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        messages : conversationHistory,
        timestamp: new Date().toISOString()
      })
    });
    const data = await res.json();
    removeThinking();

    if (data.reply) {
      appendMsg('ai', data.reply);
      conversationHistory.push({ role: 'assistant', content: data.reply });
      if (data.saved) addSavedBadge(userInner);
    } else {
      appendMsg('ai', '⚠️ ' + (data.error || '回應格式異常'));
      conversationHistory.pop();
    }
  } catch (err) {
    removeThinking();
    appendMsg('ai', '❌ 連線失敗：' + err.message);
    conversationHistory.pop();
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
