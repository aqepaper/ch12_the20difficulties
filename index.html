<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習助教</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #2d3748;
    --muted: #718096;
    --accent: #553c9a;
    --accent-light: #e9d8fd;
    --accent-dark: #44337a;
    --success: #276749;
    --success-light: #c6f6d5;
    --bubble-user: #553c9a;
    --shadow: 0 2px 10px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(85,60,154,0.3);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px; font-weight: 500;
    color: #fff; letter-spacing: 0.06em;
  }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
  .status-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.15);
    color: #fff; font-size: 11px;
    padding: 4px 10px; border-radius: 20px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #68d391; }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  .msg-wrap { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.2s ease; }
  .msg-wrap.user { flex-direction: row-reverse; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .avatar.ai {
    background: var(--accent-light); color: var(--accent);
    border: 1.5px solid #d6bcfa;
  }
  .avatar.user { background: var(--bubble-user); color: #fff; }
  .msg-inner { display: flex; flex-direction: column; max-width: 76%; }
  .msg-wrap.user .msg-inner { align-items: flex-end; }
  .bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.75;
    white-space: pre-wrap; word-break: break-word;
  }
  .bubble.ai {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .bubble.user {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .saved-badge {
    font-size: 10px; color: var(--success);
    margin-top: 4px; display: flex; align-items: center; gap: 3px;
  }
  .thinking { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
  .thinking span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-light);
    animation: bounce 1.2s ease infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  .sys-msg {
    text-align: center; font-size: 11px; color: var(--muted);
    padding: 5px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 20px;
    align-self: center;
  }

  /* Input */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px; flex-shrink: 0;
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 8px 8px 8px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); }
  #user-input {
    flex: 1; border: none; background: transparent; resize: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px; color: var(--text);
    line-height: 1.6; max-height: 120px; outline: none; min-height: 22px;
  }
  #user-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); color: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--accent-dark); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: #c4b5fd; cursor: not-allowed; }
  .footer-note { text-align: center; font-size: 10px; color: var(--muted); margin-top: 6px; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); }
    40%          { transform:translateY(-5px); }
  }
  /* 快捷按鈕 */
  .quick-btns {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .quick-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 20px;
    border: 1.5px solid var(--accent);
    background: var(--accent-light);
    color: var(--accent-dark);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .quick-btn:hover { background: #d6bcfa; }
  .quick-btn:active { transform: scale(0.97); }

  @media (max-width: 480px) {
    .msg-inner { max-width: 88%; }
    .quick-btn { font-size: 12px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">📚</div>
    <div>
      <div class="header-title">學習助教</div>
      <div class="header-sub" id="header-sub">依課程內容回答問題</div>
    </div>
  </div>
  <div class="status-pill" id="status-pill"><span class="dot"></span>已連線</div>
</header>

<div id="messages">
  <div class="sys-msg">📖 你好！請輸入與課程相關的問題</div>
</div>

<footer>
  <div class="quick-btns">
    <button class="quick-btn" onclick="sendQuick('我想寫學習單')">✏️ 我想寫學習單</button>
  </div>
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="輸入問題，按 Enter 送出…"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer-note">回答以課程內容為主・對話記錄自動存入 Sheets</div>
</footer>

<script>
// ★ GAS WebApp 網址
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxTG8e1a6BbAgzzA_8bKFe5eU8SXhI_nmh4doCYgDv7qg3BUUEz_E_sORnYvuEi2rOwow/exec';

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');

// 學員代碼對照表（前端驗證用）
const MEMBERS = {
  '9168': '傳首', '6201': '法睿', '6508': '法曠', '9207': '法煥',
  '8225': '傳普', '6030': '法涑', '1260': '傳信', '9420': '傳通',
  '6177': '傳安', '8493': '傳強', '8999': '法士', '3293': '法治',
  '8095': '傳護', '1185': '法孝', '8973': '法全', '6979': '傳惟',
  '1910': '法主'
};

let currentMember = null;
let conversationHistory = [];

// ★ 作業流程狀態
// null='一般問答' / 'step1'=等選哪一難 / 'step2'=等覺察 / 'step3'=等覺照 / 'done'=最終回饋
let hwState = null;
let chosenDifficulty = '';

const HW_INSTRUCTIONS = {
  step1:
`【作業引導模式－步驟一】
你現在正在引導慈心觀照學習單作業。
請只做一件事：詢問學員想探討二十難中的哪一難。
不要回答課程問題，不要做其他說明，只問這一個問題。`,

  step2: function(d) { return (
`【作業引導模式－步驟二】
學員已選擇：「${d}」。
請只做一件事：詢問學員覺察到自己有什麼心念或情緒（也就是發現了什麼煩惱）。
不要解釋這一難的內容，不要跑到步驟三，只問覺察這一個問題。`); },

  step3: function(d) { return (
`【作業引導模式－步驟三】
學員選的難：「${d}」，已完成覺察回答。
請只做一件事：詢問學員用什麼法門來轉變或改變這個煩惱。
不要給回饋，不要提前總結，只問覺照這一個問題。`); },

  done: function(d) { return (
`【作業引導模式－步驟四，最終回饋】
學員選的難：「${d}」，覺察與覺照均已填寫完畢。
請給予整體鼓勵與補充說明，引用課程內容呼應學員的分享，
結尾加上「感恩師兄的用心，祝福您在修行路上精進！🙏」，完成後不要再問問題。`); }
};

function getHwInstruction() {
  if (!hwState) return '';
  if (hwState === 'step1') return '\n\n' + HW_INSTRUCTIONS.step1;
  if (hwState === 'step2') return '\n\n' + HW_INSTRUCTIONS.step2(chosenDifficulty);
  if (hwState === 'step3') return '\n\n' + HW_INSTRUCTIONS.step3(chosenDifficulty);
  if (hwState === 'done')  return '\n\n' + HW_INSTRUCTIONS.done(chosenDifficulty);
  return '';
}

function advanceHwState(userText) {
  if (!hwState) return;
  if (hwState === 'step1') { chosenDifficulty = userText; hwState = 'step2'; return; }
  if (hwState === 'step2') { hwState = 'step3'; return; }
  if (hwState === 'step3') { hwState = 'done';  return; }
  if (hwState === 'done')  { hwState = null; chosenDifficulty = ''; }
}

function setMember(code, dharmaName) {
  currentMember = { code, dharmaName };
  conversationHistory = [];
  hwState = null;
  chosenDifficulty = '';
  document.getElementById('header-sub').textContent = dharmaName + ' 師兄';
  document.getElementById('status-pill').innerHTML =
    '<span class="dot"></span>' + dharmaName + ' 師兄 已識別';
}

function appendMsg(role, text) {
  const wrap  = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  const av    = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'user' ? '我' : 'AI';
  const inner = document.createElement('div');
  inner.className = 'msg-inner';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  inner.appendChild(bubble);
  wrap.appendChild(av);
  wrap.appendChild(inner);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return inner;
}

function addSavedBadge(inner) {
  const badge = document.createElement('div');
  badge.className = 'saved-badge';
  badge.innerHTML = '✓ 已存至 Sheets';
  inner.appendChild(badge);
}

function showThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ai';
  wrap.id = 'thinking';
  wrap.innerHTML = '<div class="avatar ai">AI</div>'
    + '<div class="msg-inner"><div class="bubble ai">'
    + '<div class="thinking"><span></span><span></span><span></span></div>'
    + '</div></div>';
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', function() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// 快捷按鈕：直接送出指定文字
function sendQuick(text) {
  inputEl.value = text;
  sendMessage();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  // 前端先判斷：純4位數字 → 直接識別，不送 GAS
  if (/^\d{4}$/.test(text)) {
    appendMsg('user', text);
    if (MEMBERS[text]) {
      setMember(text, MEMBERS[text]);
      const greeting = '阿彌陀佛，' + MEMBERS[text] + ' 師兄，有什麼問題想請教？';
      appendMsg('ai', greeting);
      // 把問候語也放入歷史，讓 Claude 知道已識別身份
      conversationHistory.push({ role: 'assistant', content: greeting });
    } else {
      appendMsg('ai', '代碼不符，請確認後再試。');
    }
    sendBtn.disabled = false;
    inputEl.focus();
    return;
  }

  // 尚未識別身份
  if (!currentMember) {
    appendMsg('user', text);
    appendMsg('ai', '師兄好，請先輸入您的4位數代碼以識別身份。');
    sendBtn.disabled = false;
    inputEl.focus();
    return;
  }

  // ★ 已識別身份
  const isHwTrigger = /學習單|作業|慈心觀照|覺察|覺照|我要開始寫/.test(text);

  // 觸發作業模式
  if (isHwTrigger && !hwState) {
    hwState = 'step1';
  }

  // 推進作業步驟（在送出前，依目前狀態決定下一步）
  // 注意：step1 是 Claude 問，學員回答後才推進到 step2
  // 所以這裡在「學員送出訊息」時推進
  const hwInstr = getHwInstruction();   // 先取目前步驟的指令
  if (hwState && !isHwTrigger) {
    advanceHwState(text);               // 學員回答後推進到下一步
  }

  const msgWithId = '【學員：' + currentMember.dharmaName + ' 師兄（已驗證）】\n' + text + hwInstr;
  const userInner = appendMsg('user', text);
  showThinking();

  // 把這次用戶訊息加入歷史
  conversationHistory.push({ role: 'user', content: msgWithId });

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        messages : conversationHistory,         // ★ 傳整段對話歷史
        timestamp: new Date().toISOString()
      })
    });
    const data = await res.json();
    removeThinking();

    if (data.reply) {
      appendMsg('ai', data.reply);
      // ★ 把 AI 回覆也加入歷史，下次帶上
      conversationHistory.push({ role: 'assistant', content: data.reply });
      if (data.saved) addSavedBadge(userInner);
    } else {
      appendMsg('ai', '⚠️ ' + (data.error || '回應格式異常'));
      // 送出失敗，把剛才加入的 user 訊息移除，避免歷史錯亂
      conversationHistory.pop();
    }
  } catch (err) {
    removeThinking();
    appendMsg('ai', '❌ 連線失敗：' + err.message);
    conversationHistory.pop();
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
